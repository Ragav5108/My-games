<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runner</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>

<body style="margin:0">

<script>
let player, obstacles, score = 0, scoreText, speed = 6;

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 1200 }, debug: false }
    },
    scene: { preload, create, update }
};

new Phaser.Game(config);

function preload() {
    this.load.image('bg', 'assets/bg.png');
    this.load.image('player', 'assets/player.png');
    this.load.image('obstacle', 'assets/obstacle.png');
}

function create() {
    this.add.image(0,0,'bg').setOrigin(0).setDisplaySize(config.width, config.height);

    player = this.physics.add.sprite(100, config.height - 150, 'player');
    player.setCollideWorldBounds(true);

    obstacles = this.physics.add.group();

    this.time.addEvent({
        delay: 1200,
        callback: spawnObstacle,
        callbackScope: this,
        loop: true
    });

    this.physics.add.collider(player, obstacles, gameOver, null, this);

    scoreText = this.add.text(20,20,'Score: 0',{fontSize:'24px', fill:'#fff'});

    this.input.on('pointerdown', jump, this);
}

function update() {
    obstacles.children.iterate(function(obstacle){
        if(obstacle){
            obstacle.x -= speed;
            if(obstacle.x < -50){
                obstacle.destroy();
                score += 10;
            }
        }
    });

    scoreText.setText('Score: ' + score);
    speed += 0.002;
}

function jump() {
    if(player.body.touching.down){
        player.setVelocityY(-600);
    }
}

function spawnObstacle() {
    let obstacle = obstacles.create(config.width, config.height - 100, 'obstacle');
    obstacle.setImmovable(true);
}

function gameOver() {
    this.physics.pause();
    player.setTint(0xff0000);
    this.add.text(config.width/2 - 80, config.height/2, 'GAME OVER', {fontSize:'32px', fill:'#fff'});
}
</script>

</body>
</html>
